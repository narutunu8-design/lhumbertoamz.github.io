<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Humberto Nuñez</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500&family=Fragment+Mono&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0A0A0A; --surface: #111111; --surface2: #1A1A1A;
  --border: #222222; --text: #F0EDE6; --text-muted: #666666;
  --text-dim: #3A3A3A; --accent: #C8FF00;
  --font-display: 'Syne', sans-serif;
  --font-body: 'Inter', sans-serif;
  --font-mono: 'Fragment Mono', monospace;
}
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--text); font-family: var(--font-body); font-size: 15px; line-height: 1.6; cursor: none; overflow-x: hidden; min-height: 100vh; display: flex; flex-direction: column; }
.cursor { position: fixed; width: 10px; height: 10px; background: var(--accent); border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%,-50%); transition: width .3s,height .3s; mix-blend-mode: difference; }
.cursor-ring { position: fixed; width: 40px; height: 40px; border: 1px solid rgba(200,255,0,.4); border-radius: 50%; pointer-events: none; z-index: 9998; transform: translate(-50%,-50%); transition: transform .15s,width .3s,height .3s; }
nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 28px 48px; display: flex; justify-content: space-between; align-items: center; }
nav::before { content: ''; position: absolute; inset: 0; background: linear-gradient(to bottom,rgba(10,10,10,.95),transparent); pointer-events: none; }
.nav-logo { font-family: var(--font-display); font-size: 14px; font-weight: 700; letter-spacing: .15em; text-transform: uppercase; color: var(--text); text-decoration: none; position: relative; z-index: 1; }
.nav-links { display: flex; gap: 40px; list-style: none; position: relative; z-index: 1; }
.nav-links a { font-family: var(--font-mono); font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--text-muted); text-decoration: none; transition: color .2s; }
.nav-links a:hover, .nav-links a.active { color: var(--accent); }

/* CONTACT */
.contact-main { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 120px 48px 80px; }
.contact-eyebrow { font-family: var(--font-mono); font-size: 11px; letter-spacing: .2em; text-transform: uppercase; color: var(--accent); margin-bottom: 24px; display: flex; align-items: center; gap: 12px; }
.contact-eyebrow::before { content: ''; display: block; width: 32px; height: 1px; background: var(--accent); }
.contact-title { font-family: var(--font-display); font-size: clamp(48px,8vw,120px); font-weight: 800; letter-spacing: -.04em; line-height: .9; margin-bottom: 64px; }
.contact-title span { color: var(--accent); }
.contact-links { display: flex; flex-direction: column; gap: 2px; }
.contact-link { display: flex; align-items: center; justify-content: space-between; padding: 28px 0; border-bottom: 1px solid var(--border); text-decoration: none; color: var(--text); transition: padding-left .3s ease; }
.contact-link:first-child { border-top: 1px solid var(--border); }
.contact-link:hover { padding-left: 16px; }
.contact-link:hover .contact-link-label { color: var(--accent); }
.contact-link:hover .contact-link-arrow { color: var(--accent); transform: rotate(-45deg); }
.contact-link-left { display: flex; flex-direction: column; gap: 4px; }
.contact-link-type { font-family: var(--font-mono); font-size: 9px; letter-spacing: .2em; text-transform: uppercase; color: var(--text-dim); }
.contact-link-label { font-family: var(--font-display); font-size: clamp(20px,2.5vw,32px); font-weight: 700; letter-spacing: -.01em; transition: color .2s; }
.contact-link-arrow { font-size: 24px; color: var(--text-dim); transition: color .2s,transform .3s; }

footer { background: var(--bg); padding: 32px 48px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); }
footer p { font-family: var(--font-mono); font-size: 10px; letter-spacing: .1em; color: var(--text-dim); text-transform: uppercase; }
@media(max-width:900px) { nav { padding: 20px 24px; } .nav-links { display: none; } .contact-main { padding: 100px 24px 60px; } footer { flex-direction: column; gap: 12px; text-align: center; } }
</style>
</head>
<body>
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<nav>
  <a href="index.html" class="nav-logo">Humberto Nuñez</a>
  <ul class="nav-links">
    <li><a href="work.html">Work</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="contact.html" class="active">Contact</a></li>
  </ul>
</nav>

<main class="contact-main">
  <div class="contact-eyebrow">Hablemos</div>
  <h1 class="contact-title">Let's<br>work<br><span>together.</span></h1>
  <div class="contact-links">
    <a href="mailto:Luis_humberto_nunez@hotmail.com" class="contact-link">
      <div class="contact-link-left">
        <span class="contact-link-type">Email</span>
        <span class="contact-link-label">Luis_humberto_nunez@hotmail.com</span>
      </div>
      <span class="contact-link-arrow">↗</span>
    </a>
    <a href="https://www.instagram.com/lhumbertoamz" target="_blank" rel="noopener" class="contact-link">
      <div class="contact-link-left">
        <span class="contact-link-type">Instagram</span>
        <span class="contact-link-label">@lhumbertoamz</span>
      </div>
      <span class="contact-link-arrow">↗</span>
    </a>
    <a href="tel:+525554005251" class="contact-link">
      <div class="contact-link-left">
        <span class="contact-link-type">Teléfono</span>
        <span class="contact-link-label">+52 55 5400 5251</span>
      </div>
      <span class="contact-link-arrow">↗</span>
    </a>
  </div>
</main>

<footer>
  <p>© 2026 Humberto Nuñez — AMEZCUA</p>
  <p>Ciudad de México</p>
</footer>

<script>
const cursor=document.getElementById('cursor');
const ring=document.getElementById('cursorRing');
let mouseX=0,mouseY=0,ringX=0,ringY=0;
document.addEventListener('mousemove',e=>{mouseX=e.clientX;mouseY=e.clientY;cursor.style.left=mouseX+'px';cursor.style.top=mouseY+'px';});
function animateRing(){ringX+=(mouseX-ringX)*.12;ringY+=(mouseY-ringY)*.12;ring.style.left=ringX+'px';ring.style.top=ringY+'px';requestAnimationFrame(animateRing);}
animateRing();
document.querySelectorAll('a,button').forEach(el=>{el.addEventListener('mouseenter',()=>{cursor.style.width='6px';cursor.style.height='6px';});el.addEventListener('mouseleave',()=>{cursor.style.width='10px';cursor.style.height='10px';});});
</script>
</body>
</html>
